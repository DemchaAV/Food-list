<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✏️</text></svg>">
    <title>Food Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        .food-row {
            background: linear-gradient(135deg, #1f2937 0%, #111827 100%);
            transition: all 0.2s ease;
        }

        .food-row:hover {
            background: linear-gradient(135deg, #374151 0%, #1f2937 100%);
        }

        .btn-primary {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
        }

        .btn-success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
        }

        .modal-backdrop {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
        }

        .form-input {
            transition: all 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: #f59e0b;
            box-shadow: 0 0 0 2px rgba(245, 158, 11, 0.3);
        }

        textarea {
            min-height: 80px;
            resize: vertical;
        }
    </style>
    <script src="data/loader.js"></script>
</head>

<body class="bg-gray-900 text-gray-200">
    <div class="min-h-screen flex flex-col">
        <!-- Header -->
        <div class="sticky top-0 z-20 bg-gray-900/95 backdrop-blur p-4 border-b border-gray-800">
            <div class="flex items-center justify-between gap-3 mb-3">
                <div class="flex items-center gap-3">
                    <a href="index.html" class="text-amber-400 text-xl">←</a>
                    <h1 class="text-xl font-bold text-amber-400">✏️ Food Builder</h1>
                </div>
                <div class="flex gap-2">
                    <button id="exportBtn"
                        class="bg-gray-700 text-gray-300 px-3 py-2 rounded-lg text-sm font-medium hover:bg-gray-600">
                        📥 Export
                    </button>
                    <button id="addNewBtn" class="btn-primary text-white px-3 py-2 rounded-lg text-sm font-medium">
                        + Add
                    </button>
                </div>
            </div>

            <!-- Search & Filter -->
            <div class="flex gap-2">
                <input type="text" id="searchInput" placeholder="Search..."
                    class="form-input flex-1 bg-gray-800 text-white px-4 py-2 rounded-lg border border-gray-700 text-sm">
                <select id="categoryFilter"
                    class="form-input bg-gray-800 text-white px-3 py-2 rounded-lg border border-gray-700 text-sm">
                    <option value="all">All Categories</option>
                </select>
            </div>
        </div>

        <!-- Food List -->
        <div class="flex-1 p-4">
            <div id="foodList" class="space-y-2"></div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="fixed inset-0 z-50 flex items-center justify-center modal-backdrop hidden">
        <div class="bg-gray-800 rounded-2xl w-full max-w-2xl mx-4 max-h-[90vh] overflow-hidden flex flex-col">
            <div class="flex items-center justify-between p-4 border-b border-gray-700">
                <h2 id="modalTitle" class="text-xl font-bold text-amber-400">Add Dish</h2>
                <button id="closeModal" class="text-gray-400 hover:text-red-500 text-2xl">✕</button>
            </div>

            <div class="flex-1 overflow-y-auto p-4 space-y-4">
                <input type="hidden" id="editId">

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm text-gray-400 mb-1">Name *</label>
                        <input type="text" id="editName"
                            class="form-input w-full bg-gray-700 text-white px-3 py-2 rounded-lg border border-gray-600">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-1">Category *</label>
                        <input type="text" id="editCategory"
                            class="form-input w-full bg-gray-700 text-white px-3 py-2 rounded-lg border border-gray-600"
                            list="categorySuggestions">
                        <datalist id="categorySuggestions"></datalist>
                    </div>
                </div>

                <div>
                    <label class="block text-sm text-gray-400 mb-1">Subtitle</label>
                    <input type="text" id="editSubtitle"
                        class="form-input w-full bg-gray-700 text-white px-3 py-2 rounded-lg border border-gray-600">
                </div>

                <div>
                    <label class="block text-sm text-gray-400 mb-1">📝 Description</label>
                    <textarea id="editDescription"
                        class="form-input w-full bg-gray-700 text-white px-3 py-2 rounded-lg border border-gray-600"></textarea>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm text-gray-400 mb-1">🍷 Wine Name</label>
                        <input type="text" id="editWineName"
                            class="form-input w-full bg-gray-700 text-white px-3 py-2 rounded-lg border border-gray-600">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-1">Wine Notes</label>
                        <input type="text" id="editWineNotes"
                            class="form-input w-full bg-gray-700 text-white px-3 py-2 rounded-lg border border-gray-600">
                    </div>
                </div>

                <div>
                    <label class="block text-sm text-gray-400 mb-1">📖 Glossary</label>
                    <textarea id="editGlossary"
                        class="form-input w-full bg-gray-700 text-white px-3 py-2 rounded-lg border border-gray-600"></textarea>
                </div>

                <div>
                    <label class="block text-sm text-gray-400 mb-1">📌 Additional Notes</label>
                    <textarea id="editNotes"
                        class="form-input w-full bg-gray-700 text-white px-3 py-2 rounded-lg border border-gray-600"></textarea>
                </div>

                <div>
                    <label class="block text-sm text-orange-400 mb-1">⚠️ Allergens</label>
                    <input type="text" id="editAllergens"
                        class="form-input w-full bg-gray-700 text-white px-3 py-2 rounded-lg border border-orange-600"
                        placeholder="e.g. GLUTEN, DAIRY, SHELLFISH">
                </div>

                <div>
                    <label class="block text-sm text-gray-400 mb-1">🍳 Kitchen MEP</label>
                    <textarea id="editKitchenMep"
                        class="form-input w-full bg-gray-700 text-white px-3 py-2 rounded-lg border border-gray-600"></textarea>
                </div>

                <div>
                    <label class="block text-sm text-gray-400 mb-1">🍽️ Service MEP</label>
                    <textarea id="editServiceMep"
                        class="form-input w-full bg-gray-700 text-white px-3 py-2 rounded-lg border border-gray-600"></textarea>
                </div>
            </div>

            <div class="flex gap-3 p-4 border-t border-gray-700">
                <button id="deleteBtn"
                    class="btn-danger text-white px-4 py-3 rounded-lg font-medium hidden">Delete</button>
                <div class="flex-1"></div>
                <button id="cancelBtn"
                    class="bg-gray-700 text-gray-300 px-4 py-3 rounded-lg font-medium">Cancel</button>
                <button id="saveBtn" class="btn-success text-white px-6 py-3 rounded-lg font-medium">Save</button>
            </div>
        </div>
    </div>

    <script>
        let allFoodItems = [];
        let filteredItems = [];

        const searchInput = document.getElementById('searchInput');
        const categoryFilter = document.getElementById('categoryFilter');
        const foodList = document.getElementById('foodList');
        const addNewBtn = document.getElementById('addNewBtn');
        const exportBtn = document.getElementById('exportBtn');
        const editModal = document.getElementById('editModal');
        const modalTitle = document.getElementById('modalTitle');
        const closeModal = document.getElementById('closeModal');
        const cancelBtn = document.getElementById('cancelBtn');
        const saveBtn = document.getElementById('saveBtn');
        const deleteBtn = document.getElementById('deleteBtn');

        function loadCategories() {
            const categories = Array.from(new Set(allFoodItems.map(c => c.category).filter(Boolean))).sort();
            categoryFilter.innerHTML = '<option value="all">All Categories</option>';
            categories.forEach(cat => {
                categoryFilter.innerHTML += `<option value="${cat}">${cat}</option>`;
            });

            const suggestions = document.getElementById('categorySuggestions');
            suggestions.innerHTML = categories.map(c => `<option value="${c}">`).join('');
        }

        function filterAndRender() {
            const query = searchInput.value.toLowerCase().trim();
            const category = categoryFilter.value;

            filteredItems = allFoodItems.filter(item => {
                const matchCategory = category === 'all' || item.category === category;
                const matchSearch = !query ||
                    item.name.toLowerCase().includes(query) ||
                    (item.subtitle && item.subtitle.toLowerCase().includes(query));
                return matchCategory && matchSearch;
            });
            renderList();
        }

        function renderList() {
            if (filteredItems.length === 0) {
                foodList.innerHTML = '<div class="text-center text-gray-500 py-12">No dishes found</div>';
                return;
            }

            foodList.innerHTML = filteredItems.map(item => `
                <div class="food-row rounded-xl p-3 cursor-pointer flex items-center gap-3" onclick="editItem('${item.id}')">
                    <div class="flex-1 min-w-0">
                        <div class="font-semibold text-amber-400 truncate">${item.name}</div>
                        ${item.subtitle ? `<div class="text-gray-400 text-sm truncate">${item.subtitle}</div>` : ''}
                    </div>
                    <span class="px-2 py-1 bg-gray-700 rounded text-xs text-gray-400 flex-shrink-0">${item.category}</span>
                    <span class="text-gray-600">✏️</span>
                </div>
            `).join('');
        }

        function openModal(item = null) {
            const isNew = !item;
            modalTitle.textContent = isNew ? 'Add New Dish' : 'Edit Dish';
            deleteBtn.classList.toggle('hidden', isNew);

            document.getElementById('editId').value = item?.id || '';
            document.getElementById('editName').value = item?.name || '';
            document.getElementById('editSubtitle').value = item?.subtitle || '';
            document.getElementById('editCategory').value = item?.category || '';
            document.getElementById('editDescription').value = item?.description || '';
            document.getElementById('editWineName').value = item?.wineSuggestion?.name || '';
            document.getElementById('editWineNotes').value = item?.wineSuggestion?.notes || '';
            document.getElementById('editGlossary').value = item?.glossary || '';
            document.getElementById('editNotes').value = item?.additionalNotes || '';
            document.getElementById('editAllergens').value = item?.allergens || '';
            document.getElementById('editKitchenMep').value = item?.kitchenMep || '';
            document.getElementById('editServiceMep').value = item?.serviceMep || '';

            editModal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModalFn() {
            editModal.classList.add('hidden');
            document.body.style.overflow = '';
        }

        function editItem(id) {
            const item = allFoodItems.find(i => i.id === id);
            if (item) openModal(item);
        }

        function saveItem() {
            const id = document.getElementById('editId').value;
            const name = document.getElementById('editName').value.trim();
            const category = document.getElementById('editCategory').value.trim();

            if (!name || !category) {
                alert('Name and Category are required');
                return;
            }

            const wineName = document.getElementById('editWineName').value.trim();
            const wineNotes = document.getElementById('editWineNotes').value.trim();

            const item = {
                id: id || (name.toLowerCase().replace(/[^a-z0-9]+/g, '-') + Date.now()),
                name,
                subtitle: document.getElementById('editSubtitle').value.trim(),
                category,
                description: document.getElementById('editDescription').value.trim() || null,
                wineSuggestion: wineName ? { name: wineName, notes: wineNotes } : null,
                glossary: document.getElementById('editGlossary').value.trim() || null,
                additionalNotes: document.getElementById('editNotes').value.trim() || null,
                allergens: document.getElementById('editAllergens').value.trim() || null,
                kitchenMep: document.getElementById('editKitchenMep').value.trim() || null,
                serviceMep: document.getElementById('editServiceMep').value.trim() || null
            };

            if (id) {
                const index = allFoodItems.findIndex(i => i.id === id);
                if (index !== -1) allFoodItems[index] = item;
            } else {
                allFoodItems.push(item);
            }

            saveToStorage();
            loadCategories();
            filterAndRender();
            closeModalFn();
        }

        function deleteItem() {
            const id = document.getElementById('editId').value;
            if (!id || !confirm('Delete this dish?')) return;

            allFoodItems = allFoodItems.filter(i => i.id !== id);
            saveToStorage();
            loadCategories();
            filterAndRender();
            closeModalFn();
        }

        function saveToStorage() {
            localStorage.setItem('foodItems', JSON.stringify(allFoodItems));
        }

        function loadFromStorage() {
            const stored = localStorage.getItem('foodItems');
            if (stored) {
                try {
                    return JSON.parse(stored);
                } catch (e) {
                    return null;
                }
            }
            return null;
        }

        function exportData() {
            const dataStr = 'window.registerFoodCategory(' + JSON.stringify(allFoodItems, null, 2) + ');';
            const blob = new Blob([dataStr], { type: 'application/javascript' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'scotts.js';
            a.click();
            URL.revokeObjectURL(url);
        }

        // Event listeners
        addNewBtn.onclick = () => openModal();
        exportBtn.onclick = exportData;
        closeModal.onclick = closeModalFn;
        cancelBtn.onclick = closeModalFn;
        saveBtn.onclick = saveItem;
        deleteBtn.onclick = deleteItem;
        searchInput.oninput = filterAndRender;
        categoryFilter.onchange = filterAndRender;
        editModal.onclick = (e) => { if (e.target === editModal) closeModalFn(); };

        function initialize() {
            const stored = loadFromStorage();
            if (stored && stored.length > 0) {
                allFoodItems = stored;
            } else if (window.allFoodItems && window.allFoodItems.length > 0) {
                allFoodItems = window.allFoodItems;
                saveToStorage();
            }
            loadCategories();
            filterAndRender();
        }

        window.addEventListener('foodLoaded', initialize);
        document.addEventListener('DOMContentLoaded', () => {
            if (window.foodDataReady) initialize();
            else {
                const stored = loadFromStorage();
                if (stored && stored.length > 0) {
                    allFoodItems = stored;
                    loadCategories();
                    filterAndRender();
                }
            }
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW error:', err));
        }
    </script>
</body>

</html>
