<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📱</text></svg>">
    <title>Food Catalog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            overscroll-behavior: none;
        }

        .food-card {
            background: linear-gradient(135deg, #1f2937 0%, #111827 100%);
            transition: all 0.2s ease;
        }

        .food-card:active {
            transform: scale(0.98);
        }

        .category-btn.active {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: white;
        }

        .modal-backdrop {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
        }

        .search-input:focus {
            outline: none;
            box-shadow: 0 0 0 2px rgba(245, 158, 11, 0.5);
        }
    </style>
    <script src="data/loader.js"></script>
</head>

<body class="bg-gray-900 text-gray-200">
    <div class="min-h-screen flex flex-col">
        <!-- Header -->
        <div class="sticky top-0 z-20 bg-gray-900/95 backdrop-blur p-4 border-b border-gray-800">
            <div class="flex items-center gap-3 mb-3">
                <a href="index.html" class="text-amber-400 text-xl">←</a>
                <h1 class="text-xl font-bold text-amber-400 flex-1">📱 Food Catalog</h1>
                <span id="itemCount" class="text-gray-400 text-sm">0 items</span>
            </div>

            <!-- Search -->
            <input type="text" id="searchInput" placeholder="Search dishes..."
                class="search-input w-full bg-gray-800 text-white px-4 py-3 rounded-xl border border-gray-700 mb-3">

            <!-- Categories -->
            <div id="categoryList" class="flex gap-2 overflow-x-auto pb-2 -mx-4 px-4"></div>
        </div>

        <!-- Food List -->
        <div id="foodList" class="flex-1 p-4 space-y-3"></div>
    </div>

    <!-- Detail Modal -->
    <div id="detailModal" class="fixed inset-0 z-50 flex items-end modal-backdrop hidden">
        <div class="bg-gray-800 rounded-t-3xl w-full max-h-[85vh] overflow-y-auto p-6 pb-8">
            <div class="w-12 h-1 bg-gray-600 rounded-full mx-auto mb-4"></div>
            <button id="closeModal" class="absolute top-4 right-4 text-gray-400 hover:text-red-500 text-2xl">✕</button>
            <div id="detailContent"></div>
        </div>
    </div>

    <script>
        let allFoodItems = [];
        let filteredItems = [];
        let selectedCategory = 'all';

        const searchInput = document.getElementById('searchInput');
        const categoryList = document.getElementById('categoryList');
        const foodList = document.getElementById('foodList');
        const itemCount = document.getElementById('itemCount');
        const detailModal = document.getElementById('detailModal');
        const detailContent = document.getElementById('detailContent');
        const closeModal = document.getElementById('closeModal');

        function renderCategories() {
            const categories = ['all', ...Array.from(new Set(allFoodItems.map(c => c.category).filter(Boolean))).sort()];
            categoryList.innerHTML = '';
            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = 'category-btn flex-shrink-0 px-4 py-2 rounded-xl font-medium text-sm bg-gray-700 text-gray-300 whitespace-nowrap';
                btn.textContent = cat === 'all' ? 'All' : cat;
                if (cat === selectedCategory) btn.classList.add('active');
                btn.onclick = () => {
                    selectedCategory = cat;
                    categoryList.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    filterAndRender();
                };
                categoryList.appendChild(btn);
            });
        }

        function filterAndRender() {
            const query = searchInput.value.toLowerCase().trim();
            filteredItems = allFoodItems.filter(item => {
                const matchCategory = selectedCategory === 'all' || item.category === selectedCategory;
                const matchSearch = !query ||
                    item.name.toLowerCase().includes(query) ||
                    (item.subtitle && item.subtitle.toLowerCase().includes(query)) ||
                    (item.description && item.description.toLowerCase().includes(query));
                return matchCategory && matchSearch;
            });
            renderList();
        }

        function renderList() {
            itemCount.textContent = `${filteredItems.length} items`;
            if (filteredItems.length === 0) {
                foodList.innerHTML = '<div class="text-center text-gray-500 py-12">No dishes found</div>';
                return;
            }

            foodList.innerHTML = filteredItems.map(item => `
                <div class="food-card rounded-xl p-4 cursor-pointer" onclick="showDetail('${item.id}')">
                    <div class="flex justify-between items-start gap-3">
                        <div class="flex-1 min-w-0">
                            <h3 class="font-semibold text-amber-400 truncate">${item.name}</h3>
                            ${item.subtitle ? `<p class="text-gray-400 text-sm truncate">${item.subtitle}</p>` : ''}
                            <span class="inline-block mt-2 px-2 py-0.5 bg-gray-700 rounded text-xs text-gray-400">${item.category}</span>
                        </div>
                        <span class="text-gray-500 text-xl">→</span>
                    </div>
                </div>
            `).join('');
        }

        function showDetail(id) {
            const item = allFoodItems.find(i => i.id === id);
            if (!item) return;

            detailContent.innerHTML = `
                <h2 class="text-2xl font-bold text-amber-400 mb-1">${item.name}</h2>
                ${item.subtitle ? `<p class="text-gray-400 mb-4">${item.subtitle}</p>` : '<div class="mb-4"></div>'}
                
                <div class="space-y-4">
                    <div class="inline-block px-3 py-1 bg-amber-900/30 text-amber-400 rounded-full text-sm">${item.category}</div>
                    
                    ${item.description ? `
                    <div class="bg-gray-700/50 rounded-xl p-4">
                        <h3 class="font-semibold text-gray-300 mb-2">📝 Description</h3>
                        <p class="text-gray-400 text-sm">${item.description}</p>
                    </div>` : ''}
                    
                    ${item.wineSuggestion ? `
                    <div class="bg-gray-700/50 rounded-xl p-4">
                        <h3 class="font-semibold text-gray-300 mb-2">🍷 Wine Pairing</h3>
                        <p class="text-amber-400 font-medium">${item.wineSuggestion.name}</p>
                        ${item.wineSuggestion.notes ? `<p class="text-gray-400 text-sm mt-1">${item.wineSuggestion.notes}</p>` : ''}
                    </div>` : ''}
                    
                    ${item.glossary ? `
                    <div class="bg-gray-700/50 rounded-xl p-4">
                        <h3 class="font-semibold text-gray-300 mb-2">📖 Glossary</h3>
                        <p class="text-gray-400 text-sm">${item.glossary}</p>
                    </div>` : ''}
                    
                    ${item.additionalNotes ? `
                    <div class="bg-gray-700/50 rounded-xl p-4">
                        <h3 class="font-semibold text-gray-300 mb-2">📌 Notes</h3>
                        <p class="text-gray-400 text-sm">${item.additionalNotes}</p>
                    </div>` : ''}
                    
                    ${item.allergens ? `
                    <div class="bg-orange-900/30 rounded-xl p-4">
                        <h3 class="font-semibold text-orange-400 mb-2">⚠️ Allergens</h3>
                        <p class="text-orange-300">${item.allergens}</p>
                    </div>` : ''}
                    
                    ${item.kitchenMep ? `
                    <div class="bg-gray-700/50 rounded-xl p-4">
                        <h3 class="font-semibold text-gray-300 mb-2">🍳 Kitchen MEP</h3>
                        <p class="text-gray-400 text-sm">${item.kitchenMep}</p>
                    </div>` : ''}
                    
                    ${item.serviceMep ? `
                    <div class="bg-gray-700/50 rounded-xl p-4">
                        <h3 class="font-semibold text-gray-300 mb-2">🍽️ Service MEP</h3>
                        <p class="text-gray-400 text-sm">${item.serviceMep}</p>
                    </div>` : ''}
                </div>
            `;
            detailModal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function hideDetail() {
            detailModal.classList.add('hidden');
            document.body.style.overflow = '';
        }

        closeModal.onclick = hideDetail;
        detailModal.onclick = (e) => { if (e.target === detailModal) hideDetail(); };
        searchInput.oninput = filterAndRender;

        function initialize() {
            if (window.allFoodItems && window.allFoodItems.length > 0) {
                allFoodItems = window.allFoodItems;
                renderCategories();
                filterAndRender();
            }
        }

        window.addEventListener('foodLoaded', initialize);
        document.addEventListener('DOMContentLoaded', () => {
            if (window.foodDataReady) initialize();
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW error:', err));
        }
    </script>
</body>

</html>
