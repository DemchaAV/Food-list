<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍽️</text></svg>">
    <title>Scott's Food List</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100dvh;
        }

        .card {
            background: linear-gradient(135deg, #1f2937 0%, #111827 100%);
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .card-icon {
            font-size: 3rem;
            transition: transform 0.3s ease;
        }

        .card:hover .card-icon {
            transform: scale(1.1);
        }

        .gradient-text {
            background: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
    </style>
</head>

<body class="bg-gray-900 text-gray-200">
    <div class="min-h-screen flex flex-col items-center justify-center p-6">
        <!-- Header -->
        <div class="text-center mb-12">
            <div class="text-6xl mb-4">🍽️</div>
            <h1 class="text-4xl md:text-5xl font-bold gradient-text mb-2">Scott's Food List</h1>
            <p class="text-gray-400 text-lg">Richmond Restaurant Training</p>
        </div>

        <!-- Navigation Cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-4xl w-full">
            <!-- Food Trainer -->
            <a href="food_trainer.html" class="card rounded-2xl p-8 text-center cursor-pointer">
                <div class="card-icon mb-4">🎓</div>
                <h2 class="text-xl font-bold text-amber-400 mb-2">Food Trainer</h2>
                <p class="text-gray-400 text-sm">Learn dishes, wines & service</p>
            </a>

            <!-- Mobile Catalog -->
            <a href="mobile_food.html" class="card rounded-2xl p-8 text-center cursor-pointer">
                <div class="card-icon mb-4">📱</div>
                <h2 class="text-xl font-bold text-amber-400 mb-2">Mobile Catalog</h2>
                <p class="text-gray-400 text-sm">Browse all dishes</p>
            </a>

            <!-- Food Builder -->
            <a href="food_builder.html" class="card rounded-2xl p-8 text-center cursor-pointer">
                <div class="card-icon mb-4">✏️</div>
                <h2 class="text-xl font-bold text-amber-400 mb-2">Food Builder</h2>
                <p class="text-gray-400 text-sm">Create & edit dishes</p>
            </a>
        </div>

        <!-- Footer -->
        <div class="mt-12 text-center text-gray-500 text-xs">
            <p>Scott's Richmond • Food Bible</p>
        </div>
    </div>

    <!-- Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('SW registered'))
                .catch(err => console.log('SW error:', err));
        }
    </script>
</body>

</html>
